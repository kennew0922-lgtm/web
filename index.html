        /* ✨ Google検索窓の魔法スタイル */
.google-search-container {
    margin-top: -10px;
    margin-bottom: -10px;
    padding: 10px;
    background: rgba(0, 105, 217, 0.1);
    border: 1px solid rgba(0, 242, 254, 0.3);
    border-radius: 8px;
    backdrop-filter: blur(5px);
}

.search-box {
    display: flex;
    gap: 8px;
}

.search-input {
    flex: 1;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 242, 254, 0.5);
    border-radius: 4px;
    padding: 8px 12px;
    color: #e0f7ff;
    font-family: 'Consolas', monospace;
    outline: none;
    transition: 0.3s;
}

.search-input:focus {
    border-color: #00f2fe;
    box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
}

.search-button {
    background: rgba(0, 105, 217, 0.4);
    border: 1px solid #00f2fe;
    color: #00f2fe;
    border-radius: 4px;
    padding: 0 15px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 12px;
}

.search-button:hover {
    background: rgba(0, 242, 254, 0.2);
    box-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
}

        /* 🌸 上部固定バナー */
        .system-banner {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 40px;
            background: rgba(0, 105, 217, 0.3);
            border-bottom: 1px solid #00f2fe;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        /* 🌸 左右レイアウトコンテナ */
        .main-layout {
            display: flex;
            gap: 20px;
            margin-top: 60px;
        }

        .left-content {
            flex: 4;
            overflow-y: auto;
            height: calc(100vh - 80px);
        }

        .right-content {
            flex: 6;
            position: sticky;
            top: 60px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 🌸 お天気エリア（横配置） */
        .weather-panel {
            background: rgba(0, 170, 255, 0.1);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .weather-item { text-align: center; }
        .weather-city { font-size: 10px; color: #00f2fe; opacity: 0.8; margin-bottom: 4px; }
        .weather-info { font-size: 18px; font-weight: bold; }

        /* 🌸 実用ランチャー（カレンダー上部） */
        .utility-launcher {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            margin-top: -15px;
            gap: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 254, 0.15);
        }

        /* カレンダーフィルター（既存） */
        .right-content iframe {
            filter: invert(90%) hue-rotate(180deg) brightness(1.1) contrast(0.9);
            border-radius: 8px;
            background-color: #000;
        }

        /* --- 既存のギャラリー等のスタイルは維持 --- */
        .section-title {
            background: #000; color: #00f2fe; padding: 10px 20px;
            margin: 20px 0 15px 0; font-size: 12px; font-weight: bold;
            border-left: 5px solid #00f2fe; letter-spacing: 3px;
        }
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px; margin-bottom: 30px; padding: 15px;
            border: 1px solid rgba(0, 242, 254, 0.15); background: rgba(255, 255, 255, 0.02);
        }
/* 🌸 アイコンリンクの基本設定と光の魔法 */
        .icon-link img {
            width: 55px; height: 55px; object-fit: cover;
            border: 1px solid rgba(0, 242, 254, 0.3); 
            border-radius: 4px;
            transition: all 0.3s ease; /* 変化をなめらかにする魔法 🌸 */
            cursor: pointer;
        }

        /* 🌸 マウスを乗せた時の反応（ホバー） */
        .icon-link img:hover {
            transform: translateY(-2px); /* 若干上に浮き上がります 🌸 */
            border-color: #00f2fe; /* 縁の色をはっきりさせます 🌸 */
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.8); /* 淵に光を付与します 🌸 */
            filter: brightness(1.2); /* アイコン自体も少し明るくします 🌸 */
        }

        /* 実用ランチャー側の小さいアイコンも同様に光らせる設定 */
        .utility-launcher .icon-link img {
            width: 35px; height: 35px;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #345485; }
